<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Reaction Duel - Co-op Cinema Games</title>
    <link rel="stylesheet" href="/games/shared/game-base.css">
    <link rel="stylesheet" href="/games/reaction-duel/style.css">
</head>
<body>
<div class="theater-lights"></div>

<div class="game-container">
    <a href="/" class="back-link">← Back to Cinema</a>

    <div class="game-header">
        <div class="game-icon">⚡</div>
        <h1>Reaction Duel</h1>
        <p class="game-subtitle">Wait for green, tap as fast as you can! Best of 3 rounds.</p>
    </div>

    <!-- LOBBY SCREEN -->
    <div class="game-screen active" id="screenLobby">
        <div class="glass-card" style="margin-bottom:16px;">
            <div class="input-group">
                <label>👤 Your Name</label>
                <input type="text" id="playerName" placeholder="Enter your name">
            </div>
            <button class="btn btn-primary" id="btnCreate" onclick="onCreateRoom()">
                <span>⚡</span> Create Game Room
            </button>
            <div class="divider"><span>OR JOIN</span></div>
            <div class="input-group">
                <label>🎫 Room Code</label>
                <input type="text" id="roomInput" placeholder="Enter room code">
            </div>
            <button class="btn btn-secondary" onclick="onJoinRoom()">
                <span>🚪</span> Join Room
            </button>
        </div>
    </div>

    <!-- WAITING ROOM -->
    <div class="game-screen" id="screenWaiting">
        <div class="glass-card">
            <div class="room-code-box">
                <code id="displayCode" onclick="copyCode()">--------</code>
                <span class="copy-hint">Click to copy room code</span>
            </div>
            <h3 style="margin:16px 0 10px;text-align:center;color:var(--theater-amber);">Players</h3>
            <ul class="player-list" id="playerList"></ul>
            <p id="waitingHint" style="text-align:center;color:var(--text-secondary);margin:12px 0;font-size:0.9rem;">Need at least 2 players to start</p>
            <button class="btn btn-primary" id="btnReady" onclick="onReady()" disabled>
                <span>✋</span> Ready!
            </button>
            <p id="readyStatus" style="text-align:center;color:var(--text-secondary);margin-top:10px;font-size:0.85rem;"></p>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div class="game-screen" id="screenGame">
        <div class="glass-card" style="text-align:center;">
            <div id="roundInfo" style="color:var(--theater-amber);font-size:0.9rem;margin-bottom:10px;">Round 1 of 3</div>
            <div id="reactionZone" class="reaction-zone" onclick="onTap()">
                <div id="zoneText" class="zone-text">Get Ready...</div>
            </div>
            <div id="reactionResult" class="reaction-result"></div>
        </div>
    </div>

    <!-- SCOREBOARD SCREEN -->
    <div class="game-screen" id="screenScoreboard">
        <div class="glass-card">
            <h2 style="text-align:center;margin-bottom:20px;">🏆 Final Results</h2>
            <table class="scoreboard" id="finalScoreboard">
                <thead><tr><th>Player</th><th>Wins</th><th>Best Time</th></tr></thead>
                <tbody id="scoreBody"></tbody>
            </table>
            <button class="btn btn-primary" style="margin-top:20px;" onclick="onPlayAgain()">
                <span>🔄</span> Play Again
            </button>
            <a href="/" class="btn btn-secondary" style="margin-top:10px;display:flex;text-decoration:none;">
                <span>🏠</span> Back to Lobby
            </a>
        </div>
    </div>
</div>

<script src="/games/shared/game-base.js"></script>
<script src="/games/reaction-duel/game.js"></script>
</body>
</html>
